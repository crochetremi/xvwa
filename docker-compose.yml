# =============================================================
#  ÉTAT DE DÉPART - VOLONTAIREMENT NON SÉCURISÉ
#  Objectif du TD : Arrêter de se faire pourrir :)
# =============================================================
services:

  web:
    build: ./
    container_name: td_web
    volumes:
      - ./xvwa:/var/www/html
    depends_on:
      - db
    # (!) tourne en root, aucune option de sécurité (cap_drop, read_only, no-new-privileges)
    networks:
      - frontend
  db:
    image: mysql:8.0
    container_name: td_db
    environment:
      MYSQL_ROOT_PASSWORD: root          # (!) secret en clair
      MYSQL_DATABASE: xvwa
      MYSQL_USER: xvwa
      MYSQL_PASSWORD: xvwa123             # (!) secret en clair
    # (!) aucun secret Docker utilisé
    networks:
      - backend
  nginx:
    image: nginx:stable-alpine
    container_name: td_proxy
    ports:
      - "8080:80"
      - "8443:443"           # mappé pour plus tard (TLS à activer en Faille 2)
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
    networks:
      - frontend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true