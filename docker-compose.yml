version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: proxy_nginx
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - lab_network
    depends_on:
      - xvwa

  xvwa:
    build: 
      context: .
    container_name: app_xvwa
    volumes:
      - ./xvwa:/var/www/html
    networks:
      - lab_network
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: db_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: xvwa
      MYSQL_USER: xvwa_user
      MYSQL_PASSWORD: xvwa_password
    networks:
      - lab_network

networks:
  lab_network:
    driver: bridge