# =============================================================
#  Reverse proxy - SÉCURISÉ (Faille 2)
# =============================================================

# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name localhost;
    return 301 https://$host:8443$request_uri;
}

#Zone bruteforce qui accepte 2 requetes par seconde par ip
limit_req_zone $binary_remote_addr zone=bruteforce:10m rate=2r/s;

# HTTPS
server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # TLS 1.2 et 1.3 uniquement
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    #Cache la version de nginx
    server_tokens off;

    #Header pour activer des protections
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;



    #Applique la zone
    location = /login.php {
    limit_req zone=bruteforce burst=3 nodelay;
    
    proxy_pass http://web:80;
}

}
